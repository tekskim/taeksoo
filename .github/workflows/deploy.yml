name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build main app
        run: pnpm run build

      - name: Ensure 404.html exists for SPA routing
        run: |
          if [ ! -f docs/404.html ]; then
            cp public/404.html docs/404.html
          fi
          ls -la docs/404.html

      - name: Install shared-v2 CSS dependencies
        run: cd thaki-shared-v2 && npm install xterm@^5.3.0 --no-save

      - name: Install shared-v2 preview dependencies
        run: cd thaki-shared-v2/preview && npm install --legacy-peer-deps

      - name: Build shared-v2 preview
        run: cd thaki-shared-v2/preview && npm run build

      - name: Add SPA fallback for shared-v2 preview
        run: cp docs/shared-v2/index.html docs/shared-v2/404.html

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Move Storybook to docs/storybook
        run: mv storybook-static docs/storybook

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
