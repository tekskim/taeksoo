name: Log Commits to Notion

on:
  push:
    branches:
      - main

jobs:
  log-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get commit info
        id: commit
        run: |
          # 커밋 메시지에서 타입 추출 (feat:, fix:, style: 등)
          FULL_MESSAGE=$(git log -1 --pretty=format:'%s')
          
          # 타입 추출 (콜론 앞의 단어)
          if [[ "$FULL_MESSAGE" =~ ^([a-z]+)(\(.+\))?: ]]; then
            TYPE="${BASH_REMATCH[1]}"
          else
            TYPE="chore"
          fi
          
          # 메시지에서 타입 접두사 제거
          MESSAGE=$(echo "$FULL_MESSAGE" | sed 's/^[a-z]*\([^)]*\)*: //')
          
          # 커밋 본문(description) 가져오기
          BODY=$(git log -1 --pretty=format:'%b' | tr '\n' ' ' | sed 's/"/\\"/g' | head -c 2000)
          
          # 환경 변수로 설정
          echo "hash=$(git log -1 --pretty=format:'%h')" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --pretty=format:'%aI')" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT
          
          # body는 여러 줄일 수 있으므로 EOF 사용
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Log to Notion
        env:
          COMMIT_BODY: ${{ steps.commit.outputs.body }}
        run: |
          # JSON 이스케이프 처리
          ESCAPED_BODY=$(echo "$COMMIT_BODY" | jq -Rs '.' | sed 's/^"//;s/"$//')
          
          curl -X POST 'https://api.notion.com/v1/pages' \
            -H 'Authorization: Bearer ${{ secrets.NOTION_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -H 'Notion-Version: 2022-06-28' \
            -d "{
              \"parent\": { \"database_id\": \"${{ secrets.NOTION_DATABASE_ID }}\" },
              \"properties\": {
                \"Commit Message\": {
                  \"title\": [{ \"text\": { \"content\": \"${{ steps.commit.outputs.message }}\" } }]
                },
                \"Date\": {
                  \"date\": { \"start\": \"${{ steps.commit.outputs.date }}\" }
                },
                \"Type\": {
                  \"select\": { \"name\": \"${{ steps.commit.outputs.type }}\" }
                },
                \"Hash\": {
                  \"rich_text\": [{ \"text\": { \"content\": \"${{ steps.commit.outputs.hash }}\" } }]
                },
                \"Author\": {
                  \"rich_text\": [{ \"text\": { \"content\": \"${{ steps.commit.outputs.author }}\" } }]
                },
                \"Description\": {
                  \"rich_text\": [{ \"text\": { \"content\": \"$ESCAPED_BODY\" } }]
                }
              }
            }"
