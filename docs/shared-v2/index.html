<body>
  <div id="root"></div>
  <script>
    // SPA redirect handler for GitHub Pages — decode ?/path back to real path
    (function(){
      var q = window.location.search;
      if (q && q.indexOf('?/') === 0) {
        var decoded = q.slice(2).split('&').map(function(s){ return s.replace(/~and~/g, '&'); }).join('?');
        var base = window.location.pathname.replace(/\/$/, '');
        window.history.replaceState(null, null, base + '/' + decoded + window.location.hash);
      }
    })();
  </script>
