<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tds_ssot/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TDS SSoT</title>
    <!-- Pretendard Font for Korean -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <!-- Prevent FOUC: Apply theme before page renders -->
    <script>
      (function() {
        var theme = localStorage.getItem('tds-theme');
        var isDark = theme === 'dark' || 
          (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <!-- Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" crossorigin src="/tds_ssot/assets/index-CGps2--C.js"></script>
    <link rel="stylesheet" crossorigin href="/tds_ssot/assets/index-DcoVeUD2.css">
  </head>
  <body style="margin: 0; padding: 0; background-color: var(--color-surface-subtle, #f8fafc);">
    <div id="root" style="min-height: 100vh; background-color: var(--color-surface-subtle, #f8fafc);"></div>
  </body>
</html>
